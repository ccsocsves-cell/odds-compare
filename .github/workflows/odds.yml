name: Odds arbitrage scan

# Scheduled scans (public repo → unlimited free minutes) plus manual
# triggers: the /arbs Discord command or the Actions "Run workflow" button.
# Cron times are UTC; Hungary is UTC+1/+2.
on:
  schedule:
    # Peak (HU evening, most line movement): every 20 min
    - cron: '*/20 14-21 * * *'
    # Off-peak: hourly, off the :00 rush (hour 8 belongs to the heartbeat run)
    - cron: '23 0-7,9-13,22-23 * * *'
    # Daily heartbeat: posts a status even with no arbs, so a quiet channel
    # is distinguishable from a broken pipeline
    - cron: '7 8 * * *'
  workflow_dispatch:
    inputs:
      debug_boabet:
        description: Save boabet network captures and upload as artifact
        type: boolean
        default: false
  # Triggered remotely by the Discord bot (discord-bot/worker.js) via
  # POST /repos/{owner}/{repo}/dispatches with event_type=run-arbs.
  repository_dispatch:
    types: [run-arbs]

# Overlapping runs double-post and fight over the seen-arbs cache; queue them.
concurrency:
  group: arbs
  cancel-in-progress: false

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Chromium for the boabet scraper (Playwright). The other scrapers are
      # plain HTTP/WebSocket and don't need a browser.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Cross-run alert dedup state. Cache entries are immutable, so save
      # under a unique key and restore the newest via the prefix.
      - name: Restore seen-arbs state
        uses: actions/cache/restore@v4
        with:
          path: data/seen-arbs.json
          key: seen-arbs-${{ github.run_id }}
          restore-keys: |
            seen-arbs-

      # NordVPN: connect to a Hungarian server before scraping. vegas.hu's
      # Altenar endpoint accepts most IPs but tippmixpro's WAMP host
      # (sportsapi.tippmixpro.hu) is geo-restricted to HU. Uses NordVPN
      # service credentials (not the account email/password) — these are at
      # https://my.nordaccount.com/dashboard/nordvpn/ → "Manual setup".
      - name: Install NordVPN CLI
        run: |
          curl -sSf https://downloads.nordcdn.com/apps/linux/install.sh | sh
          sudo usermod -aG nordvpn $USER

      - name: Connect NordVPN to Hungary
        env:
          NORDVPN_TOKEN: ${{ secrets.NORDVPN_TOKEN }}
        run: |
          # Token-only: recent nordvpn CLI removed --username login.
          # Generate at my.nordaccount.com/dashboard/nordvpn → Access tokens.
          sudo nordvpn login --token "$NORDVPN_TOKEN"
          sudo nordvpn set technology nordlynx
          sudo nordvpn connect hu
          sudo nordvpn status
          curl -s https://ipinfo.io/json

      - name: Run comparator
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ALERT_THRESHOLD_PCT: '0.5'   # min guaranteed profit % for an arb alert
          ALERT_TOP_N: '10'
          STAKE_BASE: '100'            # bankroll unit used in Discord stake split
          DEDUP_IMPROVE_PCT: '0.3'     # re-alert only when profit improves by this many pp
          ENABLE_BOABET: '1'           # set 0 to skip the Playwright scraper entirely
          BET22_MAX_CHAMPS: '25'       # politeness caps for the 22bet champ walk
          BET22_MAX_GAMES: '80'
          # Heartbeat status post only on the dedicated daily cron
          HEARTBEAT: ${{ github.event.schedule == '7 8 * * *' && '1' || '0' }}
          SAVE_SAMPLES: ${{ inputs.debug_boabet && '1' || '0' }}
          BOABET_HEADED: '1'           # dgiframe bot check rejects headless Chromium
        # xvfb-run provides the display the headed boabet browser needs
        run: xvfb-run --auto-servernum npm run compare

      - name: Save seen-arbs state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/seen-arbs.json
          key: seen-arbs-${{ github.run_id }}

      - name: Upload boabet captures
        if: ${{ always() && inputs.debug_boabet }}
        uses: actions/upload-artifact@v4
        with:
          name: boabet-samples
          path: data/samples/
          if-no-files-found: warn

      - name: Disconnect NordVPN
        if: always()
        run: sudo nordvpn disconnect || true
