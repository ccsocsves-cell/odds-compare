name: Hourly odds comparison

on:
  workflow_dispatch:
  # Triggered remotely by the Discord bot (discord-bot/worker.js) via
  # POST /repos/{owner}/{repo}/dispatches with event_type=run-arbs.
  repository_dispatch:
    types: [run-arbs]

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # NordVPN: connect to a Hungarian server before scraping. vegas.hu's
      # Altenar endpoint accepts most IPs but tippmixpro's WAMP host
      # (sportsapi.tippmixpro.hu) is geo-restricted to HU. Uses NordVPN
      # service credentials (not the account email/password) — these are at
      # https://my.nordaccount.com/dashboard/nordvpn/ → "Manual setup".
      # Production scraper uses ws+axios only (no Playwright at runtime).
      - name: Install NordVPN CLI
        run: |
          curl -sSf https://downloads.nordcdn.com/apps/linux/install.sh | sh
          sudo usermod -aG nordvpn $USER

      - name: Connect NordVPN to Hungary
        env:
          NORDVPN_TOKEN: ${{ secrets.NORDVPN_TOKEN }}
        run: |
          # Token-only: recent nordvpn CLI removed --username login.
          # Generate at my.nordaccount.com/dashboard/nordvpn → Access tokens.
          sudo nordvpn login --token "$NORDVPN_TOKEN"
          sudo nordvpn set technology nordlynx
          sudo nordvpn connect hu
          sudo nordvpn status
          curl -s https://ipinfo.io/json

      - name: Run comparator
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ALERT_THRESHOLD_PCT: '0.5'   # min guaranteed profit % for an arb alert
          ALERT_TOP_N: '10'
          STAKE_BASE: '100'            # bankroll unit used in Discord stake split
        run: npm run compare

      - name: Disconnect NordVPN
        if: always()
        run: sudo nordvpn disconnect || true
