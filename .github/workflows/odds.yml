name: Odds arbitrage scan

# Manual-only by design (no cron): run via the /arbs Discord command or the
# Actions "Run workflow" button. At ~2 runs/week the Odds API usage is
# ~19 keys × 2 markets × 9 runs/mo ≈ 350 req/mo — fits even the free tier.
on:
  workflow_dispatch:
    inputs:
      debug_boabet:
        description: Save boabet network captures and upload as artifact
        type: boolean
        default: false
  # Triggered remotely by the Discord bot (discord-bot/worker.js) via
  # POST /repos/{owner}/{repo}/dispatches with event_type=run-arbs.
  repository_dispatch:
    types: [run-arbs]

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Chromium for the boabet scraper (Playwright). The other scrapers are
      # plain HTTP/WebSocket and don't need a browser.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # NordVPN: connect to a Hungarian server before scraping. vegas.hu's
      # Altenar endpoint accepts most IPs but tippmixpro's WAMP host
      # (sportsapi.tippmixpro.hu) is geo-restricted to HU. Uses NordVPN
      # service credentials (not the account email/password) — these are at
      # https://my.nordaccount.com/dashboard/nordvpn/ → "Manual setup".
      # Production scraper uses ws+axios only (no Playwright at runtime).
      - name: Install NordVPN CLI
        run: |
          curl -sSf https://downloads.nordcdn.com/apps/linux/install.sh | sh
          sudo usermod -aG nordvpn $USER

      - name: Connect NordVPN to Hungary
        env:
          NORDVPN_TOKEN: ${{ secrets.NORDVPN_TOKEN }}
        run: |
          # Token-only: recent nordvpn CLI removed --username login.
          # Generate at my.nordaccount.com/dashboard/nordvpn → Access tokens.
          sudo nordvpn login --token "$NORDVPN_TOKEN"
          sudo nordvpn set technology nordlynx
          sudo nordvpn connect hu
          sudo nordvpn status
          curl -s https://ipinfo.io/json

      - name: Run comparator
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ALERT_THRESHOLD_PCT: '0.5'   # min guaranteed profit % for an arb alert
          ALERT_TOP_N: '10'
          STAKE_BASE: '100'            # bankroll unit used in Discord stake split
          SAVE_SAMPLES: ${{ inputs.debug_boabet && '1' || '0' }}
        run: npm run compare

      - name: Upload boabet captures
        if: ${{ always() && inputs.debug_boabet }}
        uses: actions/upload-artifact@v4
        with:
          name: boabet-samples
          path: data/samples/
          if-no-files-found: warn

      - name: Disconnect NordVPN
        if: always()
        run: sudo nordvpn disconnect || true
