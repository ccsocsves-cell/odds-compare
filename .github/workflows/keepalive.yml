name: Keepalive

# GitHub disables scheduled workflows after 60 days without repo activity.
# An empty bot commit twice a month resets that clock so the arb scan keeps
# running unattended.
on:
  schedule:
    - cron: '0 5 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Empty keepalive commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit --allow-empty -m 'ci: keepalive [skip ci]'
          git push
